<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inteligentny Lokalizator - Fundacja Pracownia Kreatywna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .mic-btn.listening { background-color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto space-y-6">
        
        <!-- Nagłówek aplikacji -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-slate-900">Inteligentny Lokalizator</h1>
            <p class="text-slate-500">Wspólna baza Pracowni Kreatywnej</p>
            <div id="connectionStatus" class="text-[10px] font-medium uppercase tracking-wider text-indigo-600">
                <span id="authStatus">Łączenie z bazą...</span>
            </div>
        </div>

        <!-- Sekcja poleceń głosowych -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 text-center space-y-6">
            <h2 class="text-lg font-semibold text-slate-800">Wydaj polecenie</h2>
            <p class="text-sm text-slate-500 max-w-sm mx-auto">
                Naciśnij mikrofon i mów. <br>
                Spróbuj: „Przenieś farby akrylowe na regał C” albo „Gdzie położyłem klucze?”.
            </p>
            
            <button id="micButton" disabled class="mic-btn group relative mx-auto flex h-24 w-12 items-center justify-center rounded-full bg-indigo-600 text-white transition-all hover:bg-indigo-700 disabled:opacity-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            
            <p id="voiceStatus" class="text-sm font-medium text-slate-400 italic">Ładowanie systemu...</p>
        </div>

        <!-- Sekcja listy przedmiotów -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50">
                <h2 class="text-lg font-semibold text-slate-800">Zapisane przedmioty</h2>
            </div>
            
            <div id="itemsList" class="divide-y divide-slate-50 px-6">
                <div id="loadingMessage" class="py-12 text-center text-slate-400">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-t-indigo-600 mb-4"></div>
                    <p>Pobieranie danych z Fundacji...</p>
                </div>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <!-- Twarde wymuszenie aktualizacji skryptu -->
    <script type="module">
        import "./lokalizator-v3.js";
    </script>
</body>
</html>
